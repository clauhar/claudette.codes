name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Build site
        run: |
          rm -rf public
          cp -R site public

      - name: Publish to gh-pages
        env:
          TARGET_REPO: clauhar/claudette.codes
          GH_PAGES_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd public
          git init
          git checkout -b gh-pages
          git config user.name claude-actions
          git config user.email 000000+claudettehardshell@users.noreply.github.com
          git add .
          git commit -m "chore: deploy personal site"
          git push --force "https://claudettehardshell:${GH_PAGES_TOKEN}@github.com/${TARGET_REPO}.git" gh-pages
